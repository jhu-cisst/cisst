name: Ubuntu 22.04

on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ main, devel ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04
    container:
      image: osrf/ros:humble-desktop

    steps:
    - uses: actions/checkout@v4

    - name: Setup ROS 2 Humble
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: humble

    - name: Cache APT packages
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/apt-cache
        key: ${{ runner.os }}-apt-humble-${{ hashFiles('.github/workflows/cmake-ubuntu-cache.cmake') }}
        restore-keys: |
          ${{ runner.os }}-apt-humble-

    - name: Install Dependencies
      run: |
        # Disable the automatic purging of the apt cache in docker images
        rm -f /etc/apt/apt.conf.d/docker-clean
        mkdir -p ${{ github.workspace }}/apt-cache
        echo "Dir::Cache::archives \"${{ github.workspace }}/apt-cache\";" | tee /etc/apt/apt.conf.d/10cache
        echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' | tee /etc/apt/apt.conf.d/01keep-debs
        apt-get update
        apt-get install -y \
          build-essential \
          cmake \
          git \
          libxml2-dev \
          libjsoncpp-dev \
          qtbase5-dev \
          qtbase5-dev-tools \
          qt5-qmake-bin \
          libqt5xmlpatterns5-dev \
          gfortran-9 \
          libgraphviz-dev \
          ccache

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-ccache-${{ hashFiles('.github/workflows/cmake-ubuntu-cache.cmake') }}
        max-size: 1G

    - name: ccache stats (before)
      run: ccache -s

    - name: Download cisstNetlib
      run: |
        mkdir -p cisstNetlib-build
        git clone -b devel https://github.com/jhu-cisst/cisstNetlib cisstNetlib-source

    - name: Build cisstNetlib
      working-directory: cisstNetlib-build
      env:
        CCACHE_BASEDIR: ${{ github.workspace }}
        CCACHE_NOHASHDIR: "true"
        CCACHE_COMPRESS: "true"
      run: |
        cmake ../cisstNetlib-source \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build . --config Release
        cmake --build . --target install

    - name: Create Build Environment
      run: mkdir -p build

    - name: Configure CMake
      shell: bash
      working-directory: build
      env:
        CCACHE_BASEDIR: ${{ github.workspace }}
        CCACHE_NOHASHDIR: "true"
        CCACHE_COMPRESS: "true"
      run: |
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -C ../.github/workflows/cmake-ubuntu-cache.cmake

    - name: Build
      working-directory: build
      shell: bash
      run: cmake --build . --config Release

    - name: Configure CMake examples
      shell: bash
      working-directory: build
      run: |
        cmake .. \
          -DCISST_BUILD_EXAMPLES=ON \
          -DCISST_cisstCommon_EXAMPLES=ON \
          -DCISST_cisstVector_EXAMPLES=ON \
          -DCISST_cisstOSAbstraction_EXAMPLES=ON \
          -DCISST_cisstNumerical_EXAMPLES=ON \
          -DCISST_cisstMultiTask_EXAMPLES=ON \
          -DCISST_cisstParameterTypes_EXAMPLES=ON \
          -DCISST_cisstRobot_EXAMPLES=ON \
          -DCISST_cisstMesh_EXAMPLES=ON

    - name: Build examples
      working-directory: build
      shell: bash
      run: cmake --build . --config Release

    - name: Test
      working-directory: build
      shell: bash
      run: |
        source cisstvars.sh
        cisstCommonTests -r
        cisstVectorTests -r
        cisstNumericalTests -r
        cisstOSAbstractionTests -r
        cisstParameterTypesTests -r

    - name: ccache stats (after)
      run: ccache -s
